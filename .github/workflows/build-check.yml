name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Production Build
    runs-on: ubuntu-latest

    # Placeholder CI database values — routes are dynamic so no real DB needed.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
      JWT_SECRET: "ci-only-placeholder-secret-at-least-32-chars-long"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      APP_PREVIEW_MODE: "false"
      NEXT_PUBLIC_DEMO_MODE: "false"
      # No SENTRY_AUTH_TOKEN — source map upload is disabled when token is absent.
      # This mirrors the current Render environment for debugging parity.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run Render build script (exact Render parity)
        # Use the same script that runs on Render so CI shows any build failures
        # with full verbose output (set -euxo pipefail).
        run: bash scripts/render-build.sh

      - name: Report
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build succeeded via \`scripts/render-build.sh\`." >> $GITHUB_STEP_SUMMARY
          du -sh .next/standalone 2>/dev/null || true
