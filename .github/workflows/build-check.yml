name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Production Build
    runs-on: ubuntu-latest

    # Placeholder CI database values are enough because routes are dynamic
    # and no real Supabase connection is attempted during the build.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
      JWT_SECRET: "ci-only-placeholder-secret-at-least-32-chars-long"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      APP_PREVIEW_MODE: "false"
      NEXT_PUBLIC_DEMO_MODE: "false"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Report
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build succeeded. All routes compiled." >> $GITHUB_STEP_SUMMARY
