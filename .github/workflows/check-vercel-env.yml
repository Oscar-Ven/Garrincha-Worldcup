name: Check Vercel Production Env

on:
  workflow_dispatch:
  push:
    branches: [fix/auth-production]
    paths: ['.github/workflows/check-vercel-env.yml']

jobs:
  check:
    name: List Vercel production env var keys (no values)
    runs-on: ubuntu-latest
    steps:
      - name: Fetch env var keys from Vercel production
        run: |
          echo "=== Probing Vercel API (with teamId) ==="
          RESP=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?teamId=${{ secrets.VERCEL_ORG_ID }}")
          TOP_KEYS=$(echo "$RESP" | jq 'keys' 2>/dev/null || echo "parse_failed")
          echo "Response top keys: $TOP_KEYS"

          if echo "$RESP" | jq -e '.envs' > /dev/null 2>&1; then
            KEYS=$(echo "$RESP" | jq -r '.envs[] | select(.target != null and (.target | map(. == "production") | any)) | .key' 2>/dev/null)
          else
            echo "=== Probing without teamId ==="
            RESP=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env")
            echo "Response top keys (no teamId): $(echo "$RESP" | jq 'keys' 2>/dev/null)"
            KEYS=$(echo "$RESP" | jq -r '(.envs // .env // [])[] | select(.target != null and (.target | map(. == "production") | any)) | .key' 2>/dev/null || echo "")
          fi

          echo ""
          echo "=== Production env var KEYS found ==="
          echo "$KEYS" | sort

          echo ""
          echo "=== Required var status ==="
          REQUIRED="DATABASE_URL DIRECT_URL JWT_SECRET OWNER_PASSWORD ADMIN_PASSWORD CENTER_ADMIN_PASSWORD RESEND_API_KEY EMAIL_FROM UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN NEXT_PUBLIC_APP_URL"
          for VAR in $REQUIRED; do
            if echo "$KEYS" | grep -qx "${VAR}"; then
              echo "PRESENT: $VAR"
            else
              echo "MISSING: $VAR"
            fi
          done
