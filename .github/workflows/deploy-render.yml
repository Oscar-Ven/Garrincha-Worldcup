name: Deploy (Render)

# Trigger production deploy on Render when CI passes on main.
# Render auto-deploys from the repo, but this workflow also triggers
# the deploy hook to ensure the exact CI-verified commit is deployed.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-render-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Render production deploy
    runs-on: ubuntu-latest

    # Only deploy if CI fully passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render Deploy Hook
        # RENDER_DEPLOY_HOOK secret must be set in GitHub repo settings.
        # Get the deploy hook URL from: Render dashboard → Service → Settings → Deploy Hook.
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping deploy trigger."
            echo "Add the hook URL from: Render dashboard → Service → Settings → Deploy Hook"
            exit 0
          fi
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
          echo "Render deploy triggered for commit ${{ github.event.workflow_run.head_sha }}"
