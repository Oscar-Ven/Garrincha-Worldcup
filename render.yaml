# Render Infrastructure as Code — GARRINCHA World Cup Prediction App
# https://render.com/docs/infrastructure-as-code
#
# Service type: Web Service (Node.js — NOT Static Site)
# Runtime:      Node 20
#
# After creating the service in the Render dashboard or via API:
#   1. Set all required environment variables in Render dashboard
#   2. Set RENDER_DEPLOY_HOOK secret in GitHub repository settings
#   3. The first deploy will run automatically after connecting the repo
#
# Do NOT put real secret values in this file. Use the Render dashboard
# environment variables section for all secrets.

services:
  - type: web
    name: garrincha-worldcup
    runtime: node
    region: frankfurt            # eu-central-1 — closest to Supabase project region
    plan: free                   # upgrade to starter/standard for production uptime
    branch: main

    # Install, build, and copy standalone static assets
    buildCommand: bash scripts/render-build.sh

    # Start the standalone Node.js server
    startCommand: node .next/standalone/server.js

    # Health check — Render marks the service healthy once this returns 200
    healthCheckPath: /

    # Environment variables — values are set in the Render dashboard
    # Only non-secret config is listed here; secrets go in Render env vars UI.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000              # Render injects PORT automatically; 10000 is the default
      - key: HOSTNAME
        value: 0.0.0.0
      # Add all secrets below via the Render dashboard (not here):
      #   DATABASE_URL      — Supabase direct connection (no pooler needed on Render)
      #   DIRECT_URL        — Supabase direct connection (same as DATABASE_URL for Render)
      #   JWT_SECRET
      #   OWNER_EMAIL
      #   OWNER_PASSWORD
      #   ADMIN_PASSWORD
      #   CENTER_ADMIN_PASSWORD
      #   NEXT_PUBLIC_APP_URL   — https://garrincha-worldcup.onrender.com (or custom domain)
      #   RESEND_API_KEY
      #   EMAIL_FROM
      #   UPSTASH_REDIS_REST_URL
      #   UPSTASH_REDIS_REST_TOKEN
      #   REDIS_URL
      #   NEXT_PUBLIC_SENTRY_DSN
      #   SENTRY_DSN
      #   SENTRY_ORG
      #   SENTRY_PROJECT
      #   SENTRY_AUTH_TOKEN
