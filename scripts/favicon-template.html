<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1024px;
  height: 1024px;
  overflow: hidden;
  background: #000;
}
.icon {
  width: 1024px;
  height: 1024px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}
.g {
  font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
  font-size: 700px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  /* optical center: G sits visually high, nudge down */
  padding-top: 60px;
  /* tight tracking */
  letter-spacing: -0.04em;
  text-rendering: geometricPrecision;
  -webkit-font-smoothing: antialiased;
}
</style>
</head>
<body>
<div class="icon"><span class="g">G</span></div>
</body>
</html>
